<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="أدخل رقمك القومي للتحقق من هويتك والبدء في عملية التصويت على منصة Egy Vote.">
    <title>التحقق من الهوية — Egy Vote</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="/css/electionFlow.css">
</head>

<body>
    <header>
        <nav>
            <a href="/" class="logo-link" aria-label="الصفحة الرئيسية">
                <img src="/images/logo.png" alt="شعار Egy Vote" id="logo">
            </a>
            <button class="menu-toggle" type="button" aria-label="فتح القائمة" aria-expanded="false">
                <i class="fa-solid fa-bars" aria-hidden="true"></i>
            </button>
            <div class="links">
                <a href="/">الرئيسية</a>
                <a href="/about">حول المنصة</a>
                <a href="/how-to-vote">كيفية التصويت</a>
                <a href="/contact">الدعم</a>
            </div>
        </nav>
    </header>

    <main class="simple-entry-page">
        <section class="simple-entry-card">
            <span class="eyebrow">التحقق من الهوية</span>
            <h1>أدخل الرقم القومي</h1>
            <p>سيتم التحقق من رقمك القومي، ثم إرسال رمز التحقق (OTP) إلى البريد الإلكتروني المسجل في بياناتك لضمان أمان عملية التصويت.</p>

            <div class="status-box" data-status-box></div>

            <form class="election-form" data-national-id-form>
                <div class="field-group">
                    <label for="national-id">الرقم القومي (14 رقمًا)</label>
                    <input id="national-id" name="nationalId" type="text" inputmode="numeric" maxlength="14"
                        placeholder="أدخل رقمك القومي المكوّن من 14 رقمًا" data-national-id-input required autocomplete="off">
                </div>

                <button class="primary-button simple-submit-button" type="submit" data-submit-button>
                    <i class="fa-solid fa-paper-plane" aria-hidden="true"></i>
                    إرسال رمز التحقق
                </button>
            </form>
        </section>
    </main>

    <script src="/js/script.js?v=20260427-3"></script>
    <script src="/js/electionApi.js?v=20260427-3"></script>
    <script src="/js/voteEntry.js?v=20260427-3"></script>
</body>

</html>
