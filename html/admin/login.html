<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول لوحة التحكم - Egy Vote</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="../../css/electionFlow.css">
    <style>
        :root {
            --bg-dark: #07111F;
            --surface-dark: #0f1d30;
            --surface-light: #0E3A5D;
            --primary-color: #35E0C4;
            --button-color: #F4B942;
            --text-light: #F7FBFF;
            --text-muted: #B7C9D9;
            --error-color: #ff6b6b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, var(--bg-dark) 0%, var(--surface-dark) 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            font-family: 'Tajawal', sans-serif;
            color: var(--text-light);
        }

        .login-container {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: linear-gradient(135deg, rgba(14, 58, 93, 0.3) 0%, rgba(15, 29, 48, 0.8) 100%);
            border: 1px solid rgba(53, 224, 196, 0.15);
            border-radius: 24px;
            padding: 48px 32px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(10px);
        }

        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .logo {
            width: auto;
            height: 52px;
            max-width: min(220px, 100%);
            margin: 0 auto 20px;
            display: block;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(53, 224, 196, 0.3));
        }

        .login-header h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-light);
        }

        .login-header p {
            color: var(--text-muted);
            font-size: 14px;
            line-height: 1.5;
        }

        .error-box {
            display: none;
            background: rgba(255, 107, 107, 0.1);
            border: 1px solid rgba(255, 107, 107, 0.3);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 20px;
            color: #ff8a8a;
            font-size: 14px;
            animation: slideDown 0.3s ease;
        }

        .error-box.visible {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-light);
        }

        .form-group input {
            width: 100%;
            padding: 12px 16px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(53, 224, 196, 0.2);
            border-radius: 12px;
            color: var(--text-light);
            font-family: 'Tajawal', sans-serif;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            background: rgba(255, 255, 255, 0.08);
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(53, 224, 196, 0.1);
        }

        .form-group input::placeholder {
            color: rgba(183, 201, 217, 0.5);
        }

        .login-button {
            width: 100%;
            padding: 14px 24px;
            background: linear-gradient(135deg, var(--button-color) 0%, #ffc84c 100%);
            color: var(--bg-dark);
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 8px 24px rgba(244, 185, 66, 0.2);
            font-family: 'Tajawal', sans-serif;
        }

        .login-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(244, 185, 66, 0.3);
        }

        .login-button:active {
            transform: translateY(0);
        }

        .footer-info {
            text-align: center;
            margin-top: 24px;
            font-size: 12px;
            color: var(--text-muted);
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 480px) {
            .login-card {
                padding: 36px 24px;
            }

            .login-header h1 {
                font-size: 24px;
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="../../images/logo.png" alt="Egy Vote" class="logo">
                <h1>لوحة التحكم</h1>
                <p>أدخل بيانات تسجيلك للدخول إلى لوحة التحكم الإدارية</p>
            </div>

            <div class="error-box" id="adminError">
                <i class="fa-solid fa-circle-exclamation"></i>
                البريد الإلكتروني أو كلمة المرور غير صحيحة
            </div>

            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="adminEmail">
                        <i class="fa-solid fa-envelope"></i> البريد الإلكتروني
                    </label>
                    <input id="adminEmail" type="email" required placeholder="أدخل بريدك الإلكتروني">
                </div>

                <div class="form-group">
                    <label for="adminPassword">
                        <i class="fa-solid fa-lock"></i> كلمة المرور
                    </label>
                    <input id="adminPassword" type="password" required placeholder="أدخل كلمة المرور">
                </div>

                <button type="submit" class="login-button">
                    <i class="fa-solid fa-sign-in-alt"></i> دخول
                </button>
            </form>

            <div class="footer-info">
                <p>© 2026 منصة التصويت الإلكترونية - جميع الحقوق محفوظة</p>
            </div>
        </div>
    </div>

    <script src="../../js/adminAuth.js"></script>
</body>

</html>
