<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل دخول لوحة التحكم - Egy Vote</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="../../css/index.css">
    <link rel="stylesheet" href="../../css/adminLogin.css">
</head>

<body>
    <!-- ===== HEADER / NAV ===== -->
    <header id="site-header" role="banner">
        <nav id="main-nav" aria-label="القائمة الرئيسية">
            <a href="/" class="logo-link" aria-label="الصفحة الرئيسية لـ Egy Vote">
                <img src="../../images/logo.png" alt="شعار Egy Vote" id="logo">
            </a>

            <button class="menu-toggle" type="button" aria-label="فتح القائمة" aria-expanded="false" aria-controls="nav-links">
                <i class="fa-solid fa-bars" aria-hidden="true"></i>
            </button>

            <div class="links" id="nav-links" role="navigation">
                <a href="/">الرئيسية</a>
                <a href="/about">حول المنصة</a>
                <a href="/how-to-vote">كيفية التصويت</a>
                <a href="/contact">الدعم</a>
                <a href="/admin/login" class="admin-btn" aria-label="الدخول إلى لوحة التحكم" aria-current="page">
                    <i class="fa-solid fa-lock" aria-hidden="true"></i> لوحة التحكم
                </a>
            </div>
        </nav>
    </header>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <img src="../../images/logo.png" alt="Egy Vote" class="logo">
                <h1>لوحة التحكم</h1>
                <p>أدخل بيانات تسجيلك للدخول إلى لوحة التحكم الإدارية</p>
            </div>

            <div class="error-box" id="adminError">
                <i class="fa-solid fa-circle-exclamation"></i>
                البريد الإلكتروني أو كلمة المرور غير صحيحة
            </div>

            <form id="adminLoginForm">
                <div class="form-group">
                    <label for="adminEmail">
                        <i class="fa-solid fa-envelope"></i> البريد الإلكتروني
                    </label>
                    <input id="adminEmail" type="email" required placeholder="أدخل بريدك الإلكتروني">
                </div>

                <div class="form-group">
                    <label for="adminPassword">
                        <i class="fa-solid fa-lock"></i> كلمة المرور
                    </label>
                    <input id="adminPassword" type="password" required placeholder="أدخل كلمة المرور">
                </div>

                <button type="submit" class="login-button">
                    <i class="fa-solid fa-sign-in-alt"></i> دخول
                </button>
            </form>

            <div class="footer-info">
                <p>© 2026 منصة التصويت الإلكترونية - جميع الحقوق محفوظة</p>
            </div>
        </div>
    </div>

    <script src="../../js/script.js" defer></script>
    <script src="../../js/adminAuth.js"></script>
</body>

</html>
