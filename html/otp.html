<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="أدخل رمز التحقق (OTP) المرسل إلى بريدك الإلكتروني للتحقق من هويتك والمتابعة في عملية التصويت.">
    <title>رمز التحقق OTP — Egy Vote</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="/css/electionFlow.css">
    <style>
        body {
            padding-top: 0;
        }

        .otp-page {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .otp-card {
            width: 100%;
            max-width: 460px;
            padding: 32px 24px;
            background: linear-gradient(180deg, rgba(14, 58, 93, 0.96), rgba(8, 20, 35, 0.96));
            border: 1px solid var(--card-border);
            border-radius: 28px;
            box-shadow: 0 16px 42px rgba(0, 0, 0, 0.22);
        }

        .otp-card h1 {
            font-size: 28px;
            margin: 0 0 8px;
        }

        .otp-card .desc {
            color: var(--text-muted);
            font-size: 16px;
            line-height: 1.8;
            margin: 0 0 24px;
        }
    </style>
</head>

<body>
    <main class="otp-page">
        <section class="otp-card" aria-labelledby="otp-title">
            <span class="eyebrow">التحقق عبر البريد الإلكتروني</span>
            <h1 id="otp-title">أدخل رمز التحقق</h1>
            <p class="desc">تم إرسال رمز تحقق مكوّن من ۶ أرقام إلى بريدك الإلكتروني المسجّل. أدخل الرمز للمتابعة وإتمام عملية التصويت.</p>

            <div class="mini-info">
                <span>الرقم القومي: <strong data-national-id-text>---</strong></span>
                <span>البريد الإلكتروني: <strong data-masked-email-text>---</strong></span>
            </div>

            <div class="status-box" data-status-box></div>

            <form class="election-form" data-otp-form>
                <div class="field-group">
                    <label for="otp">رمز التحقق</label>
                    <input id="otp" name="otp" type="text" inputmode="numeric" maxlength="6"
                        placeholder="اكتب رمز التحقق" data-otp-input required>
                </div>

                <button class="primary-button simple-submit-button" type="submit" data-submit-button>تأكيد</button>
                <button class="secondary-button simple-submit-button" type="button" data-resend-button>إعادة إرسال الرمز</button>
            </form>
        </section>
    </main>

    <script src="/js/script.js?v=20260427-4"></script>
    <script src="/js/electionApi.js?v=20260427-4"></script>
    <script src="/js/otpPage.js?v=20260427-4"></script>
</body>

</html>
