<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="نتائج الانتخابات على منصة Egy Vote — عرض النتائج والإحصائيات بشكل شفاف.">
    <title>نتائج الانتخابات — Egy Vote</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="/css/electionFlow.css">
    <style>
        .results-hero { text-align:center; padding:32px 24px 16px; }
        .results-hero h1 { font-size:clamp(26px,4vw,42px); margin-bottom:10px; }
        .results-hero p { color:var(--text-muted); font-size:18px; }
        .total-badge {
            display:inline-flex; align-items:center; gap:8px;
            background:rgba(53,224,196,0.12); border:1px solid rgba(53,224,196,0.25);
            color:var(--text-soft); padding:8px 20px; border-radius:999px;
            font-size:16px; font-weight:700; margin:16px 0;
        }
        .results-table { width:100%; border-collapse:collapse; margin-top:16px; }
        .results-table thead { background:rgba(53,224,196,0.08); }
        .results-table th {
            padding:14px 16px; text-align:right; font-size:14px; font-weight:700;
            color:var(--text-soft); border-bottom:2px solid var(--card-border);
        }
        .results-table td { padding:14px 16px; border-bottom:1px solid rgba(53,224,196,0.06); font-size:15px; vertical-align:middle; }
        .results-table tbody tr:hover { background:rgba(53,224,196,0.04); }
        .results-table tbody tr.winner-row { background:rgba(244,185,66,0.06); }
        .candidate-cell { display:flex; align-items:center; gap:12px; }
        .candidate-cell img { width:44px; height:44px; border-radius:50%; object-fit:cover; border:2px solid var(--card-border); }
        .bar-wrap { background:rgba(255,255,255,0.06); border-radius:999px; height:10px; min-width:80px; overflow:hidden; }
        .bar-fill { height:100%; border-radius:999px; background:linear-gradient(90deg,#35E0C4,#7FF0DE); }
        .winner-row .bar-fill { background:linear-gradient(90deg,#F4B942,#FFD166); }
        .winner-badge {
            display:inline-flex; align-items:center; gap:6px;
            background:rgba(244,185,66,0.15); color:#FFD166;
            padding:4px 12px; border-radius:999px; font-size:13px; font-weight:700;
        }
        .empty-state { text-align:center; padding:60px 24px; color:var(--text-muted); }
        .empty-state i { font-size:52px; color:var(--text-soft); opacity:0.4; margin-bottom:16px; display:block; }
        .table-wrap { overflow-x:auto; border-radius:14px; border:1px solid var(--card-border); }
    </style>
</head>
<body>
    <header>
        <nav aria-label="القائمة الرئيسية">
            <a href="/" class="logo-link" aria-label="الصفحة الرئيسية">
                <img src="/images/logo.png" alt="شعار Egy Vote" id="logo">
            </a>
            <button class="menu-toggle" type="button" aria-label="فتح القائمة" aria-expanded="false">
                <i class="fa-solid fa-bars" aria-hidden="true"></i>
            </button>
            <div class="links" id="nav-links">
                <a href="/">الرئيسية</a>
                <a href="/about">حول المنصة</a>
                <a href="/how-to-vote">كيفية التصويت</a>
                <a href="/contact">الدعم</a>
            </div>
        </nav>
    </header>

    <main class="flow-page" id="main-content">
        <section class="surface-card" aria-labelledby="results-title" id="results-section">

            <!-- حالة التحميل -->
            <div class="empty-state" id="results-loading" role="status">
                <i class="fa-solid fa-spinner fa-spin" aria-hidden="true"></i>
                <h1 id="results-title">جارٍ تحميل النتائج...</h1>
            </div>

            <!-- حالة عدم وجود نتائج -->
            <div class="empty-state" id="results-empty" role="status" hidden>
                <i class="fa-solid fa-chart-pie" aria-hidden="true"></i>
                <h1>لا توجد نتائج متاحة</h1>
                <p>لم تنتهِ أي انتخابات بعد. عد لاحقًا لمشاهدة النتائج.</p>
            </div>

            <!-- بيانات النتائج -->
            <div id="results-data" hidden>
                <div class="results-hero">
                    <span class="eyebrow"><i class="fa-solid fa-chart-bar" aria-hidden="true"></i> نتائج الانتخابات</span>
                    <h1 id="results-title" data-results-title>نتائج الانتخابات</h1>
                    <div class="total-badge">
                        <i class="fa-solid fa-check-to-slot" aria-hidden="true"></i>
                        إجمالي الأصوات: <strong data-results-total>0</strong>
                    </div>
                </div>
                <div class="table-wrap" role="region" aria-label="جدول نتائج المرشحين">
                    <table class="results-table">
                        <thead>
                            <tr>
                                <th scope="col">المرشح</th>
                                <th scope="col">الأصوات</th>
                                <th scope="col">النسبة</th>
                                <th scope="col">شريط الأصوات</th>
                                <th scope="col">الترتيب</th>
                            </tr>
                        </thead>
                        <tbody id="results-tbody">
                            <!-- يتم ملء هذا الجزء عبر JavaScript من /api/results -->
                        </tbody>
                    </table>
                </div>
            </div>

        </section>
    </main>

    <footer role="contentinfo" style="text-align:center;padding:24px;border-top:1px solid var(--card-border);color:var(--text-muted);font-size:14px;">
        &copy; 2026 منصة Egy Vote — جميع الحقوق محفوظة
    </footer>

    <script src="/js/script.js" defer></script>
    <script src="/js/resultsPage.js" defer></script>
</body>
</html>
